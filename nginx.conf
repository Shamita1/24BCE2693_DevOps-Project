server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Used by Nagios / Docker HEALTHCHECK / Kubernetes probes
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Used by Graphite/collectd/Prometheus-style exporters to read basic metrics
    location /nginx_status {
        stub_status on;
        access_log off;
        allow all;
    }
}
