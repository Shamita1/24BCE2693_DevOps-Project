define host {
    use                     linux-server
    host_name               abc-website-host
    alias                   ABC Technologies Website Host
    address                 host.docker.internal   ; replace with actual node/VM IP
    max_check_attempts      5
    check_period             24x7
    notification_interval    30
    notification_period      24x7
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     HTTP Website Check
    check_command           check_http!-p 30080 -u /health -e "healthy"
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     PING
    check_command           check_ping!100.0,20%!500.0,60%
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}
